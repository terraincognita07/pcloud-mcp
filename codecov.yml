# Codecov configuration. Public-repo uploads are tokenless via GitHub Actions.
coverage:
  status:
    project:
      default:
        # Don't fail the PR on small coverage dips; this is a solo project.
        target: auto
        threshold: 3%
        informational: true
    patch:
      default:
        informational: true

# main() and the OAuth browser-launch orchestration are I/O glue that is
# exercised by a smoke test, not unit tests; excluding them keeps the percentage
# honest about the logic that actually has assertions.
ignore:
  - "cmd/pcloud-mcp/**"

comment:
  layout: "reach, diff, flags, files"
  require_changes: true
