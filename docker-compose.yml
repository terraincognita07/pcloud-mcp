# Remote (HTTP) deployment of pcloud-mcp for Claude.ai web/phone access.
#
# Before `docker compose up -d`:
#   1. Run `pcloud-mcp auth` once on a machine with a browser, then copy the
#      resulting credentials.json next to this file (see the mount below).
#   2. Set PCLOUD_MCP_TOKEN to a long random secret, e.g. in a .env file:
#        PCLOUD_MCP_TOKEN=$(openssl rand -hex 32)
#   3. Put a reverse proxy (Caddy / nginx / Traefik) in front for HTTPS —
#      the container binds to loopback only, so it is never exposed directly.
#      See docs/SELF-HOSTING.md.
#
# Pin OVUMCY-style: set PCLOUD_MCP_IMAGE to a chosen tag/digest in production
# instead of building locally.

services:
  pcloud-mcp:
    build: .
    image: ${PCLOUD_MCP_IMAGE:-pcloud-mcp:local}
    restart: unless-stopped
    # Bind to loopback on the host: only the reverse proxy (also on this host)
    # can reach it. Never publish this port to 0.0.0.0.
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # Required: the bearer token clients must send. Keep it in .env, not here.
      PCLOUD_MCP_TOKEN: ${PCLOUD_MCP_TOKEN:?set PCLOUD_MCP_TOKEN (e.g. openssl rand -hex 32)}
    volumes:
      # The pCloud OAuth credentials, read-only. Create once via `pcloud-mcp auth`.
      - ./credentials.json:/home/nonroot/.config/pcloud-mcp/credentials.json:ro
    # Already non-root via the image; restated here as a guard.
    user: "65532:65532"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
