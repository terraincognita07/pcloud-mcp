name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - run: go build ./...
      - run: go vet ./...
      - name: test (race + coverage)
        run: go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        continue-on-error: true   # a Codecov outage must never red the build
        with:
          files: ./coverage.out
          slug: terraincognita07/pcloud-mcp
          token: ${{ secrets.CODECOV_TOKEN }}  # tokenless is flaky; set the repo secret
          fail_ci_if_error: false

  security:
    name: govulncheck · staticcheck · gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
      # Pinned tool versions for deterministic runs; bump deliberately.
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...
      - name: gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.26.1 -exclude-generated ./...

  docker:
    name: docker build (non-root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t pcloud-mcp:ci .
